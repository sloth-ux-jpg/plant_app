<!DOCTYPE html>
<html>
<head>
    <title>植物同定アプリ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
  <h1 class="text-center mb-4">🌱 植物検索アプリ</h1>

  <form method="POST" class="card p-4 shadow">
    
    <div class="mb-3">
      <label class="form-label">葉の形</label>
      <select name="leaf" class="form-select">
        <option value="丸い">丸い</option>
        <option value="細い">細い</option>
      </select>
    </div>

    <div class="mb-3">
      <label class="form-label">花の有無</label>
      <select name="flower" class="form-select">
        <option value="あり">あり</option>
        <option value="なし">なし</option>
      </select>
    </div>

    <button type="submit" class="btn btn-success w-100">検索</button>
  </form>

  {% if result %}
  <div class="mt-4 alert alert-info">
    <h5>結果：</h5>
    <ul>
      {% for r in result %}
      <li>{{ r[0] }}</li>
      {% endfor %}
    </ul>
  </div>
  {% else %}
  <p class="mt-3 text-center text-muted">該当する植物がありません</p>
  {% endif %}

</div>

</body>
</html>
